[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "config.settings"
python_files = ["test_*.py"]

[tool.black]
line-length = 88
target-version = ["py312"]
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.venv
  | venv
  | _build
  | build
  | dist
  | migrations
  | node_modules
  | __pycache__
)/
'''

[tool.isort]
profile = "black"
skip = ["migrations"]
known_django = ["django"]
known_third_party = ["rest_framework", "celery", "dotenv", "pydantic", "bs4", "thefuzz"]
sections = ["FUTURE", "STDLIB", "DJANGO", "THIRDPARTY", "FIRSTPARTY", "LOCALFOLDER"]
