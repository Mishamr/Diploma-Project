name: Django CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  
  tests: 
   name: Tests 
   runs-on: ubuntu-latest 
   needs: quality 

   defaults:
     run:
       working-directory: ./fiscus_project

   steps: 
     - name: Checkout code 
       uses: actions/checkout@v4 

     - name: Set up Python 
       uses: actions/setup-python@v5 
       with: 
         python-version: '3.12' 
         cache: 'pip' 

     - name: Install system dependencies
       run: sudo apt-get install -y default-libmysqlclient-dev build-essential pkg-config

     - name: Install dependencies
       run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        pip install pytest pytest-cov pytest-django

     - name: Run tests with coverage
       env:
         DB_ENGINE: django.db.backends.sqlite3
         DB_NAME: ":memory:"
       run: pytest --cov=. --cov-report=html --cov-fail-under=60

     - name: Upload coverage report 
       uses: actions/upload-artifact@v4 
       if: always() 
       with: 
         name: coverage-report 
         path: fiscus_project/htmlcov
         retention-days: 7

  quality:
    name: Code Quality
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./fiscus_project

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install quality tools
        run: pip install flake8 black isort bandit
        
      - name: Flake8
        continue-on-error: true
        run: flake8 .

      - name: Black
        run: black --check .

      - name: isort
        run: isort --check-only .

      - name: Bandit
        run: bandit -r . -x .venv,migrations -ll
